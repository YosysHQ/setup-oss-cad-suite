name: 'Setup OSS CAD Suite'
description: 'This downloads and sets up a pre-build EDA environment from the YosysHQ OSS CAD Suite.'
author: 'YosysHQ'

branding:
  color: 'purple'
  icon: 'cpu'

inputs:
  github-token:
    description: >
      The workflow GITHUB_TOKEN to authenticate to the API with, this helps with API request limits
      from the public endpoint.
    required: false

  version:
    description: >
      Version range or exact version of OSS CAD Suite to use
    required: false

  python-override:
    description: >
     Use Python3 provided with OSS CAD Suite
    default: false
    required: false

runs:
  using: node20
  main: dist/index.js
